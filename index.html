<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efefed;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9b9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --radius:8px;--radius-lg:12px;
  --green:#1d9e75;--orange:#ba7517;--red:#d4537e;
}
@media(prefers-color-scheme:dark){

  .t-linux{background:#1a3a0a!important;color:#a0cc70!important}
  .t-web{background:#0a2a4a!important;color:#80b4e8!important}
  .t-hack{background:#0a3020!important;color:#70c8a0!important}
  .t-algo{background:#3a2000!important;color:#e8a840!important}
  .t-rest{background:#2a2a28!important;color:#9b9a94!important}
  .t-review{background:#2a0a18!important;color:#d880a0!important}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:12px;overflow-x:hidden}
.app{max-width:720px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:12px;color:var(--text3);margin-bottom:14px}
.sync-status{font-size:11px;padding:4px 10px;border-radius:99px;display:inline-block;margin-bottom:12px}
.sync-ok{background:#e1f5ee;color:#085041}
.sync-saving{background:#faeeda;color:#633806}
.sync-err{background:#fbeaf0;color:#72243e}
.nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.nav-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:5px 14px;cursor:pointer;font-size:13px;color:var(--text)}
.nav-btn:hover{background:var(--bg2)}
.month-title{font-size:16px;font-weight:500;flex:1;text-align:center}
.legend{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dh-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dh{font-size:11px;color:var(--text3);text-align:center;padding:4px 0}
.dh.sun{color:#e24b4a}.dh.sat{color:#185fa5}
.wgrid{display:flex;flex-direction:column;gap:2px}
.wrow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dc{border-radius:4px;padding:3px 4px;min-height:60px;border:0.5px solid var(--border);background:var(--bg);cursor:pointer;transition:border-color .15s;position:relative}
.dc:hover{border-color:var(--border2)}
.dc.empty{background:transparent;border-color:transparent;cursor:default;min-height:0}
.dc.today{border-color:var(--text)!important;border-width:1.5px!important}
.dc.noplan{background:var(--bg2);cursor:default}
.dc.doubled{border-color:var(--orange)!important}
.dn{font-size:11px;color:var(--text3);margin-bottom:3px}
.dn.sun{color:#e24b4a}.dn.sat{color:#185fa5}.dn.td{color:var(--text);font-weight:600}
.tag{font-size:8px;padding:1px 4px;border-radius:99px;margin-bottom:1px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.t-linux{background:#eaf3de;color:#27500a}
.t-web{background:#e6f1fb;color:#0c447c}
.t-hack{background:#e1f5ee;color:#085041}
.t-algo{background:#faeeda;color:#633806}
.t-rest{background:#f1efe8;color:#5f5e5a}
.t-review{background:#fbeaf0;color:#72243e}
.double-badge{position:absolute;top:4px;right:4px;font-size:8px;padding:1px 4px;border-radius:99px;background:#faeeda;color:#633806;line-height:1.4;font-weight:500}
.progress-bar{height:3px;border-radius:99px;background:var(--bg3);margin-top:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:var(--green);transition:width .3s}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:12px}
.modal-bg.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:20px;max-width:400px;width:100%;border:0.5px solid var(--border2);max-height:90vh;overflow-y:auto}
.m-meta{font-size:11px;color:var(--text3);margin-bottom:2px}
.m-title{font-size:15px;font-weight:500;margin-bottom:3px;line-height:1.4}
.m-path{font-size:11px;color:var(--text2);margin-bottom:12px}
.sec-label{font-size:10px;color:var(--text3);letter-spacing:.05em;margin-bottom:6px;margin-top:14px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.sec-progress{font-size:10px;color:var(--green);margin-left:auto}
.cl-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:4px;background:var(--bg);transition:opacity .15s}
.cl-item.done{opacity:.5}
.cl-item.done .cl-text{text-decoration:line-through;color:var(--text3)}
.cl-item.moved-away{opacity:.35;border-style:dashed}
.cl-item.incoming{border-color:var(--green);background:#f0faf6}
.cl-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;margin-top:1px}
.cl-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.cl-text{font-size:12px;line-height:1.5;flex:1;color:var(--text)}
.cl-actions{display:flex;gap:3px;flex-shrink:0}
.cl-btn{background:none;border:0.5px solid var(--border2);border-radius:5px;padding:2px 6px;cursor:pointer;font-size:10px;color:var(--text2);transition:background .1s;white-space:nowrap}
.cl-btn:hover{background:var(--bg2)}
.cl-btn.push{color:var(--orange)}
.cl-btn.pull{color:var(--green)}
.cl-btn.restore{color:var(--text3)}
.incoming-label{font-size:9px;color:var(--green);margin-bottom:2px}
.divider{height:0.5px;background:var(--border);margin:14px 0}
.btn-row{display:flex;gap:8px;margin-top:16px}
.m-close{flex:1;padding:9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:none;cursor:pointer;font-size:13px;color:var(--text)}
.m-close:hover{background:var(--bg2)}
.double-btn{flex:1;padding:9px;border:none;border-radius:var(--radius);background:var(--orange);color:#fff;cursor:pointer;font-size:13px;font-weight:500}
.double-btn:hover{opacity:.88}
.pull-panel{display:none;margin-top:12px;border-top:0.5px solid var(--border);padding-top:12px}
.pull-panel.open{display:block}
.pull-question{font-size:13px;font-weight:500;margin-bottom:10px;line-height:1.5}
.pull-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.pull-opt{padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);cursor:pointer;font-size:12px;line-height:1.5;background:var(--bg);text-align:left;color:var(--text)}
.pull-opt:hover{background:var(--bg2)}
.pull-opt.selected{border-color:var(--orange);background:#faeeda;color:#633806}
.pull-confirm{width:100%;padding:9px;border:none;border-radius:var(--radius);background:var(--orange);color:#fff;cursor:pointer;font-size:13px;font-weight:500}

.footer{margin-top:16px;font-size:11px;color:var(--text3);text-align:center}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjJm7WdM2BbfFRvuoKKw3qFkLsdf0wfbw",
  authDomain: "dreamhack-calendar.firebaseapp.com",
  projectId: "dreamhack-calendar",
  storageBucket: "dreamhack-calendar.firebasestorage.app",
  messagingSenderId: "267583766579",
  appId: "1:267583766579:web:798a8c6e55743c6b336346"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const STATE_DOC = doc(db, "calendar", "state");

// ── 상태 ──────────────────────────────────────────────────────
window.checked = {};
window.moved = {};
window.doubles = {};
window.restOpts = {};
let saveTimer = null;

function setSyncStatus(s){
  const el=document.getElementById('sync-status');
  if(s==='ok'){el.textContent='☁ 동기화됨';el.className='sync-status sync-ok';}
  else if(s==='saving'){el.textContent='☁ 저장 중...';el.className='sync-status sync-saving';}
  else{el.textContent='☁ 오프라인 (로컬 저장)';el.className='sync-status sync-err';}
}

// Firestore 실시간 동기화
onSnapshot(STATE_DOC, (snap) => {
  if(snap.exists()){
    const d=snap.data();
    window.checked=d.checked||{};
    window.moved=d.moved||{};
    window.doubles=d.doubles||{};
    window.restOpts=d.restOpts||{};
  }
  setSyncStatus('ok');
  if(typeof render==='function') render(window.cY,window.cM);
}, (err)=>{
  console.error(err);
  setSyncStatus('err');
  // 오프라인이면 localStorage fallback
  try{
    window.checked=JSON.parse(localStorage.getItem('dh_checked')||'{}');
    window.moved=JSON.parse(localStorage.getItem('dh_moved')||'{}');
    window.doubles=JSON.parse(localStorage.getItem('dh_doubles')||'{}');
    window.restOpts=JSON.parse(localStorage.getItem('dh_restopts')||'{}');
  }catch(e){}
  if(typeof render==='function') render(window.cY,window.cM);
});

// 저장 (debounce 1초)
window.saveAll = function(){
  setSyncStatus('saving');
  // localStorage fallback
  try{
    localStorage.setItem('dh_checked',JSON.stringify(window.checked));
    localStorage.setItem('dh_moved',JSON.stringify(window.moved));
    localStorage.setItem('dh_doubles',JSON.stringify(window.doubles));
    localStorage.setItem('dh_restopts',JSON.stringify(window.restOpts));
  }catch(e){}
  // Firestore 저장 (1초 debounce)
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await setDoc(STATE_DOC,{
        checked:window.checked,
        moved:window.moved,
        doubles:window.doubles,
        restOpts:window.restOpts,
        updatedAt:new Date().toISOString()
      });
      setSyncStatus('ok');
    }catch(e){
      console.error(e);
      setSyncStatus('err');
    }
  },1000);
};
</script>

function makeItemId(planIdx,kind,i){return `p${planIdx}_${kind}_${i}`;}
function getPlanItemIds(planIdx){
  const p=PLAN[planIdx];if(!p)return[];
  const ids=[];
  if(p.type==='rest'||p.type==='review'){(p.items||[]).forEach((_,i)=>ids.push(makeItemId(planIdx,'item',i)));}
  else{(p.hack||[]).forEach((_,i)=>ids.push(makeItemId(planIdx,'hack',i)));(p.algo||[]).forEach((_,i)=>ids.push(makeItemId(planIdx,'algo',i)));}
  return ids;
}
function getItemText(id){
  const m=id.match(/^p(\d+)_(\w+)_(\d+)$/);if(!m)return'';
  const[,pi,kind,i]=[...m];const p=PLAN[parseInt(pi)];if(!p)return'';
  if(kind==='item')return(p.items||[])[parseInt(i)]||'';
  if(kind==='hack')return(p.hack||[])[parseInt(i)]||'';
  if(kind==='algo')return(p.algo||[])[parseInt(i)]||'';
  return'';
}

const STUDY_INDICES=PLAN.reduce((arr,p,i)=>{if(p.type!=='rest'&&p.type!=='review')arr.push(i);return arr;},[]);
function isOriginallyRest(dateIdx){if(dateIdx<0||dateIdx>=PLAN.length)return false;return PLAN[dateIdx].type==='rest'||PLAN[dateIdx].type==='review';}

function getBasePlanIdx(dateIdx){
  let planIdx=dateIdx;
  const pullEntries=Object.entries(window.doubles||{}).filter(([k])=>parseInt(k)<dateIdx).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  for(const[k,v]of pullEntries){
    const opt=(window.restOpts||{})[k]||'include';
    if(opt==='include'){planIdx+=v;}
    else{const curPos=STUDY_INDICES.indexOf(planIdx);if(curPos!==-1){const newPos=Math.min(curPos+v,STUDY_INDICES.length-1);planIdx=STUDY_INDICES[newPos];}}
  }
  return planIdx;
}

function getPlansForDate(y,m,d){
  const dt=new Date(y,m,d);if(dt<S||dt>E)return null;
  const dateIdx=Math.round((dt-S)/86400000);
  const basePlanIdx=getBasePlanIdx(dateIdx);
  const extra=(window.doubles||{})[String(dateIdx)]||0;
  const thisOpt=(window.restOpts||{})[String(dateIdx)]||'include';
  const hasPriorPull=Object.keys(window.doubles||{}).some(k=>parseInt(k)<dateIdx);
  if(hasPriorPull&&isOriginallyRest(dateIdx)){
    const recentOpt=Object.entries(window.doubles||{}).filter(([k])=>parseInt(k)<dateIdx).sort((a,b)=>parseInt(b[0])-parseInt(a[0]))[0];
    if(recentOpt&&((window.restOpts||{})[recentOpt[0]]||'include')==='skip'){
      return{plans:[PLAN[dateIdx]],dateIdx,extra:0,planIdx:dateIdx,locked:true};
    }
  }
  const plans=[];if(basePlanIdx<PLAN.length)plans.push(PLAN[basePlanIdx]);
  let nextIdx=basePlanIdx;
  for(let i=0;i<extra;i++){
    if(thisOpt==='skip'){const curPos=STUDY_INDICES.indexOf(nextIdx);if(curPos!==-1&&curPos+1<STUDY_INDICES.length){nextIdx=STUDY_INDICES[curPos+1];}else{nextIdx++;}}
    else{nextIdx++;}
    if(nextIdx<PLAN.length)plans.push(PLAN[nextIdx]);
  }
  return{plans,dateIdx,extra,planIdx:basePlanIdx};
}

function getItemsForDate(dateIdx){
  const res=getPlansForDate(...dateIdxToYMD(dateIdx));
  if(!res)return{own:[],incoming:[]};
  const own=[];
  res.plans.forEach(p=>{
    const pi=PLAN.indexOf(p);
    getPlanItemIds(pi).forEach(id=>{
      if((window.moved||{})[id]!==undefined&&(window.moved||{})[id]!==dateIdx)return;
      own.push({id,text:getItemText(id),kind:id.includes('_algo_')?'algo':'hack'});
    });
  });
  const incoming=[];
  for(const[id,targetIdx]of Object.entries(window.moved||{})){
    if(targetIdx===dateIdx){incoming.push({id,text:getItemText(id),kind:id.includes('_algo_')?'algo':'hack'});}
  }
  return{own,incoming};
}

function dateIdxToYMD(idx){const dt=new Date(S.getTime()+idx*86400000);return[dt.getFullYear(),dt.getMonth(),dt.getDate()];}
function dateToIdx(y,m,d){return Math.round((new Date(y,m,d)-S)/86400000);}

const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DN=['일','월','화','수','목','금','토'];
window.cY=2026;window.cM=5;
let modalDateIdx=null;
let selectedRestOpt=null;

function tagClass(p){
  if(!p)return'';
  if(p.type==='rest')return't-rest';
  if(p.type==='review')return't-review';
  if(p.type==='linux')return't-linux';
  if(p.type==='web')return't-web';
  return't-hack';
}

function getDateProgress(dateIdx){
  const items=getItemsForDate(dateIdx);
  const all=[...items.own,...items.incoming];
  if(all.length===0)return null;
  const done=all.filter(it=>(window.checked||{})[it.id]).length;
  return{done,total:all.length};
}

function render(y,m){
  window.cY=y;window.cM=m;
  document.getElementById('mtitle').textContent=`${y}년 ${MN[m]}`;
  const first=new Date(y,m,1).getDay();
  const total=new Date(y,m+1,0).getDate();
  let html='';let d=1-first;
  while(d<=total){
    html+='<div class="wrow">';
    for(let dow=0;dow<7;dow++){
      if(d<1||d>total){html+='<div class="dc empty"></div>';}
      else{
        const res=getPlansForDate(y,m,d);
        const p=res&&res.plans.length>0?res.plans[0]:null;
        const isDoubled=res&&res.extra>0;
        const dt2=new Date(y,m,d);
        const isT=dt2.toDateString()===TODAY.toDateString();
        const numCls='dn'+(dow===0?' sun':dow===6?' sat':'')+(isT?' td':'');
        let cellCls='dc'+(isT?' today':'')+(p?'':' noplan')+(isDoubled?' doubled':'');
        let tags='';
        let badge=isDoubled?`<span class="double-badge">×${res.extra+1}</span>`:'';
        let progressHtml='';
        if(p&&p.type!=='rest'){
          const dateIdx=Math.round((new Date(y,m,d)-S)/86400000);
          const prog=getDateProgress(dateIdx);
          if(prog&&prog.total>0){
            const pct=Math.round(prog.done/prog.total*100);
            progressHtml=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
          }
        }
        if(p){
          const tc=tagClass(p);
          if(p.type==='rest'){tags=`<span class="tag t-rest">${p.title||'휴식'}</span>`;}
          else if(p.type==='review'){tags=`<span class="tag t-review">복습</span><span class="tag t-algo">알고리즘</span>`;}
          else{const sh=p.title.length>11?p.title.slice(0,11)+'…':p.title;tags=`<span class="tag ${tc}">${sh}</span><span class="tag t-algo">Programmers</span>`;}
        }
        const cl=p?`onclick="openModal(${y},${m},${d})"`:' ';
        html+=`<div class="${cellCls}" ${cl}><div class="${numCls}">${d}</div>${tags}${progressHtml}${badge}</div>`;
      }
      d++;
    }
    html+='</div>';
    if(d>total)break;
  }
  document.getElementById('grid').innerHTML=html;
}

function openModal(y,m,d){
  const res=getPlansForDate(y,m,d);
  if(!res||res.plans.length===0)return;
  modalDateIdx=dateToIdx(y,m,d);
  const dow=new Date(y,m,d).getDay();
  document.getElementById('m-meta').textContent=`${y}년 ${MN[m]} ${d}일 (${DN[dow]})`;
  document.getElementById('m-title').textContent=res.plans[0].title+(res.extra>0?` +${res.extra}일치`:'');
  document.getElementById('m-path').textContent=res.plans[0].path||'';
  document.getElementById('pull-panel').classList.remove('open');
  selectedRestOpt=null;
  renderModalBody();
  document.getElementById('mbg').classList.add('open');
}

function renderModalBody(){
  const res=getPlansForDate(...dateIdxToYMD(modalDateIdx));
  if(!res)return;
  const items=getItemsForDate(modalDateIdx);
  let html='';
  const p=res.plans[0];
  const isRestDay=p.type==='rest'||p.type==='review';
  if(isRestDay){
    html+=`<div class="sec-label">오늘은</div>`;
    (p.items||['완전히 쉬기']).forEach((txt,i)=>{
      const id=makeItemId(PLAN.indexOf(p),'item',i);
      html+=renderItem(id,txt,'t-rest',false,false);
    });
  }else{
    const hackItems=items.own.filter(it=>!it.id.includes('_algo_'));
    const algoItems=items.own.filter(it=>it.id.includes('_algo_'));
    const incomingHack=items.incoming.filter(it=>!it.id.includes('_algo_'));
    const incomingAlgo=items.incoming.filter(it=>it.id.includes('_algo_'));
    const hackDone=hackItems.filter(it=>(window.checked||{})[it.id]).length+incomingHack.filter(it=>(window.checked||{})[it.id]).length;
    const hackTotal=hackItems.length+incomingHack.length;
    const algoDone=algoItems.filter(it=>(window.checked||{})[it.id]).length+incomingAlgo.filter(it=>(window.checked||{})[it.id]).length;
    const algoTotal=algoItems.length+incomingAlgo.length;
    html+=`<div class="sec-label">해킹 <span class="sec-progress">${hackDone}/${hackTotal}</span></div>`;
    hackItems.forEach(it=>{html+=renderItem(it.id,it.text,tagClass(p),true,true);});
    incomingHack.forEach(it=>{html+=renderItem(it.id,it.text,tagClass(p),true,false,true);});
    html+=`<div class="sec-label">알고리즘 <span class="sec-progress">${algoDone}/${algoTotal}</span></div>`;
    algoItems.forEach(it=>{html+=renderItem(it.id,it.text,'t-algo',true,true);});
    incomingAlgo.forEach(it=>{html+=renderItem(it.id,it.text,'t-algo',true,false,true);});
  }
  document.getElementById('m-body').innerHTML=html;
  let btns=`<button class="m-close" onclick="closeModal()">닫기</button>`;
  if(!isRestDay){
    btns+=`<button class="double-btn" onclick="showDayPullPanel()">⚡ 하루치 더 당기기</button>`;
    if(res.extra>0)btns+=`<button class="m-close" style="background:var(--bg2)" onclick="undoDouble()">↩ 되돌리기</button>`;
  }
  document.getElementById('m-btns').innerHTML=btns;
}

function renderItem(id,text,colorClass,canAct,canPush,isIncoming=false){
  const isDone=(window.checked||{})[id]||false;
  const isMoved=(window.moved||{})[id]!==undefined&&!isIncoming;
  let cls='cl-item'+(isDone?' done':'')+(isMoved?' moved-away':'')+(isIncoming?' incoming':'');
  let actions='';
  if(canAct){
    if(isIncoming||isMoved){actions+=`<button class="cl-btn restore" onclick="restoreItem('${id}')">↩</button>`;}
    else{
      if(canPush)actions+=`<button class="cl-btn push" onclick="pushItem('${id}')">→내일</button>`;
      actions+=`<button class="cl-btn pull" onclick="pullItem('${id}')">←당기기</button>`;
    }
  }
  const incomingLabel=isIncoming?`<div class="incoming-label">↙ 다른 날에서 당겨옴</div>`:'';
  return`<div class="${cls}" id="item_${id}">
    <div class="cl-check${isDone?' checked':''}" onclick="toggleCheck('${id}')">${isDone?'✓':''}</div>
    <div style="flex:1"><div class="cl-text">${text}</div>${incomingLabel}</div>
    <div class="cl-actions">${actions}</div>
  </div>`;
}

function toggleCheck(id){
  if(!window.checked)window.checked={};
  window.checked[id]=!window.checked[id];
  window.saveAll();renderModalBody();render(window.cY,window.cM);
}
function pushItem(id){
  if(!window.moved)window.moved={};
  window.moved[id]=modalDateIdx+1;
  window.saveAll();renderModalBody();render(window.cY,window.cM);
}
function pullItem(id){
  if(!window.moved)window.moved={};
  window.moved[id]=modalDateIdx;
  window.saveAll();renderModalBody();render(window.cY,window.cM);
}
function restoreItem(id){
  if(window.moved)delete window.moved[id];
  window.saveAll();renderModalBody();render(window.cY,window.cM);
}
function showDayPullPanel(){
  selectedRestOpt=null;
  document.getElementById('opt-include').classList.remove('selected');
  document.getElementById('opt-skip').classList.remove('selected');
  document.getElementById('pull-confirm').disabled=true;
  document.getElementById('pull-panel').classList.add('open');
}
function selectRestOpt(opt){
  selectedRestOpt=opt;
  document.getElementById('opt-include').classList.toggle('selected',opt==='include');
  document.getElementById('opt-skip').classList.toggle('selected',opt==='skip');
  document.getElementById('pull-confirm').disabled=false;
}
function confirmDayPull(){
  if(!selectedRestOpt)return;
  const k=String(modalDateIdx);
  if(!window.doubles)window.doubles={};
  if(!window.restOpts)window.restOpts={};
  window.doubles[k]=(window.doubles[k]||0)+1;
  window.restOpts[k]=selectedRestOpt;
  window.saveAll();
  document.getElementById('pull-panel').classList.remove('open');
  closeModal();render(window.cY,window.cM);
}
function undoDouble(){
  const k=String(modalDateIdx);
  if(window.doubles&&window.doubles[k]>0){window.doubles[k]--;if(window.doubles[k]===0)delete window.doubles[k];}
  window.saveAll();closeModal();render(window.cY,window.cM);
}
function closeIf(e){if(e.target===document.getElementById('mbg'))closeModal();}
function closeModal(){document.getElementById('mbg').classList.remove('open');}
function prev(){let m=window.cM-1,y=window.cY;if(m<0){m=11;y--;}render(y,m);}
function next(){let m=window.cM+1,y=window.cY;if(m>11){m=0;y++;}render(y,m);}
render(window.cY,window.cM);
</script>
</body>
</html>
